services:
  - type: web
    name: truth-counter
    runtime: node
    plan: starter        # cheapest paid tier — needed for persistent disk
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/stats
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
    disk:
      name: truth-counter-data
      mountPath: /data
      sizeGB: 1
